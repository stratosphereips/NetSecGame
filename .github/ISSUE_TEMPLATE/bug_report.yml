name: 🐛 Bug Report
description: File a bug report to help us squash errors.
title: "[Bug]: "
labels: ["bug"]
assignees: [ondrej-lukas]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what went wrong...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Exactly what steps do we need to take to see this bug?
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of our software are you running?
      placeholder: e.g., 0.1.1
    validations:
      required: true
    
  - type: dropdown
    id: installation_method
    attributes:
      label: Installation / Deployment Method
      description: How are you running the application?
      multiple: false
      options:
        - Installed from PyPI (pip)
        - Running locally from source
        - Pulled image from Docker Hub
        - Local Docker build
    validations:
      required: true

